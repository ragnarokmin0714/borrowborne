name: Web

# Deploy the playable web build to GitHub Pages on every push to main.
# One-time setup: repo Settings → Pages → Source: "GitHub Actions".
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: jetli/trunk-action@v0.5.0
        with:
          version: "latest"

      # --public-url must match the Pages path: user.github.io/borrowborne/
      - name: Build web bundle
        run: trunk build --release --public-url /borrowborne/
        working-directory: crates/borrowborne-app

      - uses: actions/upload-pages-artifact@v3
        with:
          path: crates/borrowborne-app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
