name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Quality gate on Linux: formatting, lints, and the full test suite.
  # The runner selftests shell out to the toolchain's own rustc, so this
  # job also proves the compile-player-code path works off-machine.
  quality:
    name: fmt + clippy + test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install GUI and audio build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-dev libwayland-dev libasound2-dev \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  # The real check Linux cannot give us: RustcLocal spawns `rustc` and
  # executes an extensionless binary — Windows path/exe semantics only
  # show up on an actual Windows runner.
  build-windows:
    name: build + test (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace
      - run: cargo test --workspace
