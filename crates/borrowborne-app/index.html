<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Borrowborne</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description"
          content="A roguelike puzzle RPG where the spells are real Rust — the borrow checker is physics, and panic! is permadeath." />
    <!-- trunk builds the bin target and injects the wasm loader here. -->
    <link data-trunk rel="rust" data-bin="borrowborne" data-wasm-opt="2" />
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background: #121011; /* theme panel_fill: no white flash on load */
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            outline: none;
        }
    </style>
</head>
<body>
    <canvas id="borrowborne_canvas"></canvas>
</body>
</html>
